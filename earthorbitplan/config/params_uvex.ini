# =============================================================================
# params_uvex.ini
#
# Configuration file for m4opt-scheduler.py
# Supports three execution backends: condor | parallel | dask
# =============================================================================


# =============================================================================
[download]
# Zenodo observing-scenario archive
# =============================================================================

permanent_doi = 14142969
file_name     = runs.zip


# =============================================================================
[scenarios]
# Gravitational-wave observing runs to process
# =============================================================================

zip            = ./runs.zip
subdir         = runs
runs           = O5a-HL O5a-HLV O5b-HLV O5c-HLV
mass_threshold = 3.0


# =============================================================================
[paths]
# All directories are relative to data_dir unless absolute paths are given
# =============================================================================

data_dir    = uvex           # root output directory
skymap_dir  = skymaps        # input  : sky maps        (.fits)
sched_dir   = schedules      # output : schedules       (.ecsv)
log_dir     = logs           # output : HTCondor logs   (stdout / stderr)
prog_dir    = progress       # output : progress files

event_table = observing-scenarios.ecsv   # must contain column "coinc_event_id"


# =============================================================================
[mission]
# Telescope and bandpass configuration
# =============================================================================

mission  = uvex
bandpass = NUV        # uvex: FUV | NUV   ultrasat: NUV   ztf: ztfg | ztfr | ztfi
skygrid  = None       # set to None if the mission has no multi-grid support
nside    = 128        # HEALPix resolution -- must be a power of 2


# =============================================================================
[kilonova]
# Kilonova absolute magnitude prior (AB system)
# =============================================================================

absmag_mean  = -12.4
absmag_stdev =   1.3


# =============================================================================
[scheduling]
# Timing, SNR, and exposure constraints
# =============================================================================

snr          = 5
delay        = 0day       # time between GW alert and start of observations
deadline     = 6hour      # hard cutoff after alert

exptime_min  = 300        # seconds
exptime_max  = inf        # seconds -- set to inf for unconstrained


# =============================================================================
[solver]
# MILP solver resource limits
# =============================================================================

timelimit = 2hour
memory    = 10GiB
jobs      = 0             # threads per solve  (0 = use all available cores)


# =============================================================================
[execution]
# Backend: condor | parallel | dask
# =============================================================================

backend = condor
n_cores = 10              # used only in parallel mode; ignored by condor


# =============================================================================
[output]
# Post-processing results aggregation (postprocess.py)
# =============================================================================

output_file = uvex.ecsv
